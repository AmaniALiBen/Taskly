<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskly | Details</title>

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #7c3aed;
            --primary-glow: rgba(124, 58, 237, 0.4);
            --bg-dark: #0a0a14;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            color: white;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .bg-gradient-custom {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% -20%, #312e81 0%, #0a0a14 60%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-sizing: border-box;
        }

        .logo { font-weight: 900; font-size: 1.25rem; letter-spacing: 1px; }
        .logo span { color: var(--primary); }
        .btn-back { background: none; border: none; color: #a78bfa; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; cursor: pointer; }

        /* Main Grid */
        main {
            padding-top: 120px;
            padding-bottom: 60px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 1024px) {
            main { grid-template-columns: 7.5fr 4.5fr; }
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
        }

        .content-left { display: flex; flex-direction: column; gap: 30px; }
        
        .title-hero { 
            font-size: 1.8rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin: 0; 
            line-height: 1.2;
            letter-spacing: -0.5px;
        }

        /* Seller Box - No lines, just a clean badge word */
        .seller-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px 24px;
        }

        .avatar-wrapper { position: relative; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        
        .seller-info { 
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .seller-info h4 { 
            font-weight: 800; 
            font-size: 1.1rem; 
            margin: 0; 
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .level-badge {
            font-size: 0.65rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            padding: 2px 10px;
            border-radius: 20px;
            box-shadow: 0 4px 10px var(--primary-glow);
        }

        /* Gallery System */
        .gallery-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .main-image-wrapper {
            width: 100%;
            height: 450px;
            position: relative;
            overflow: hidden;
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .main-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }

        .thumbnails-grid {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 0;
        }

        .thumbnail {
            width: 80px;
            height: 60px;
            border-radius: 0.8rem;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            opacity: 0.4;
            transition: 0.3s;
            flex-shrink: 0;
        }

        .thumbnail.active {
            border-color: var(--primary);
            opacity: 1;
            transform: translateY(-2px);
        }

        /* Overview */
        .overview-card { padding: 35px; }
        .section-title { font-size: 1.2rem; font-weight: 800; text-transform: uppercase; border-left: 4px solid var(--primary); padding-left: 15px; margin-bottom: 20px; }
        .description-text { color: var(--text-muted); line-height: 1.7; font-size: 1rem; }

        /* Packages */
        .package-card { position: sticky; top: 100px; overflow: hidden; border-radius: 2rem; }
        .tabs-header { display: flex; font-size: 0.7rem; font-weight: 800; background: rgba(0,0,0,0.2); }
        .package-tab { flex: 1; text-align: center; padding: 20px 0; cursor: pointer; transition: 0.3s; color: var(--text-muted); border-bottom: 2px solid transparent; }
        .package-tab.active { color: var(--primary); background: rgba(124, 58, 237, 0.1); border-bottom: 2px solid var(--primary); }
        
        .package-body { padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .price-row { display: flex; justify-content: space-between; align-items: center; }
        .pkg-name { font-weight: 800; font-size: 1.2rem; }
        .pkg-price { color: var(--primary); font-weight: 900; font-size: 1.5rem; }
        .pkg-desc { color: var(--text-muted); font-size: 0.9rem; line-height: 1.4; margin: 0; }

        .features-list { display: flex; flex-direction: column; gap: 12px; padding: 10px 0; }
        .feature-item { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; color: #e2e8f0; }
        .feature-item i { color: var(--success); font-size: 0.75rem; }

        .meta-row { display: flex; justify-content: space-between; padding: 12px 0; border-top: 1px solid var(--glass-border); font-size: 0.75rem; color: var(--text-muted); font-weight: 700; }

        .btn-buy {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 0.5px;
        }

        .btn-buy:hover { transform: translateY(-2px); box-shadow: 0 10px 20px var(--primary-glow); }
    </style>
</head>

<body>

<div class="bg-gradient-custom"></div>

<nav class="navbar">
    <div class="logo">TASK<span>LY</span></div>
    <button onclick="goHome()" class="btn-back">← Back to Explore</button>
</nav>

<div class="container">
    <main>
        <!-- LEFT CONTENT -->
        <div class="content-left">
            <h1 id="title" class="title-hero">...</h1>

            <div class="seller-card glass-card">
                <div class="avatar-wrapper">
                    <img id="avatar" class="avatar" alt="Seller Avatar">
                </div>
                <div class="seller-info">
                    <h4>
                        <span id="seller">...</span>
                        <span id="levelBadge" class="level-badge">...</span>
                    </h4>
                    <span style="font-size: 0.75rem; color: var(--text-muted); font-weight: 600;">Verified Visual Designer</span>
                </div>
            </div>

            <div class="gallery-container">
                <div class="main-image-wrapper">
                    <img id="mainImage" src="" alt="Main Preview">
                </div>
                <div class="thumbnails-grid" id="thumbnails"></div>
            </div>

            <div class="overview-card glass-card">
                <h2 class="section-title">Description</h2>
                <div id="desc" class="description-text"></div>
            </div>
        </div>

        <!-- RIGHT CONTENT -->
        <div class="content-right">
            <div class="package-card glass-card">
                <div class="tabs-header">
                    <div onclick="switchTab('basic')" id="tab-basic" class="package-tab active">BASIC</div>
                    <div onclick="switchTab('standard')" id="tab-standard" class="package-tab">STANDARD</div>
                    <div onclick="switchTab('premium')" id="tab-premium" class="package-tab">PREMIUM</div>
                </div>

                <div class="package-body">
                    <div class="price-row">
                        <h3 id="pkgName" class="pkg-name">...</h3>
                        <span id="pkgPrice" class="pkg-price">...</span>
                    </div>

                    <p id="pkgDesc" class="pkg-desc"></p>

                    <div id="features" class="features-list"></div>

                    <div class="meta-row">
                        <span id="delivery"><i class="far fa-clock"></i> ...</span>
                        <span id="revisions"><i class="fas fa-sync"></i> ...</span>
                    </div>

                    <button onclick="buy()" class="btn-buy">Continue to Purchase</button>
                    <p style="text-align: center; font-size: 0.65rem; color: var(--text-muted); margin-top: 10px;">Secure Payment via Taskly Escrow</p>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
const gig = {
    title: "Elite Branding & Identity System",
    seller: "Vector Aura",
    sellerLevel: 3, // 1: New Seller, 2: Professional, 3: Expert
    images: [
        "https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=1000",
        "https://images.unsplash.com/photo-1626785774573-4b799315345d?w=1000",
        "https://images.unsplash.com/photo-1586717791821-3f44a563eb4c?w=1000",
        "https://images.unsplash.com/photo-1572044162444-ad60f128bde2?w=1000"
    ],
    desc: [
        "Looking for a world-class visual identity? I provide top-tier branding systems for tech startups and modern enterprises.",
        "My process involves deep research, moodboarding, and precision design to ensure your brand stands out."
    ],
    packages: {
        basic: {
            name: "Startup Foundation",
            price: 150,
            desc: "Perfect for early stage startups needing a professional starting point.",
            delivery: "3 Days Delivery",
            revisions: "2 Revisions",
            features: ["Professional Logo", "Color Palette", "High-Res PNG/JPG"]
        },
        standard: {
            name: "Business Growth",
            price: 350,
            desc: "A comprehensive branding kit for growing businesses looking to scale.",
            delivery: "5 Days Delivery",
            revisions: "5 Revisions",
            features: ["Everything in Basic", "Source Files (AI)", "Social Media Kit"]
        },
        premium: {
            name: "Enterprise Elite",
            price: 750,
            desc: "The ultimate identity solution including motion and full brand guidelines.",
            delivery: "10 Days Delivery",
            revisions: "Unlimited",
            features: ["Everything in Standard", "Brand Guidelines", "Motion Logo"]
        }
    }
};

let currentTab = "basic";

function load() {
    document.getElementById("title").innerText = gig.title;
    document.getElementById("seller").innerText = gig.seller;
    document.getElementById("avatar").src = "https://i.pravatar.cc/100?u=aura_vector";
    document.getElementById("desc").innerHTML = gig.desc.map(d => `<p style="margin-bottom:15px;">${d}</p>`).join("");
    
    // Update Single Word Level UI with new requested names
    const level = gig.sellerLevel;
    const badge = document.getElementById("levelBadge");
    
    const levelNames = {
        1: "New Seller",
        2: "Professional",
        3: "Expert"
    };
    
    badge.innerText = levelNames[level];
    
    initGallery();
    render(currentTab);
}

function initGallery() {
    const mainImg = document.getElementById("mainImage");
    const thumbContainer = document.getElementById("thumbnails");
    mainImg.src = gig.images[0];
    
    thumbContainer.innerHTML = gig.images.map((img, index) => `
        <img 
            src="${img}" 
            class="thumbnail ${index === 0 ? 'active' : ''}" 
            onclick="updateGallery(this, '${img}')"
            alt="Work Sample"
        >
    `).join("");
}

function updateGallery(el, src) {
    const mainImg = document.getElementById("mainImage");
    mainImg.style.opacity = '0';
    setTimeout(() => {
        mainImg.src = src;
        mainImg.style.opacity = '1';
    }, 200);
    
    document.querySelectorAll(".thumbnail").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
}

function switchTab(t) {
    currentTab = t;
    document.querySelectorAll(".package-tab").forEach(x => x.classList.remove("active"));
    document.getElementById("tab-" + t).classList.add("active");
    render(t);
}

function render(t) {
    const p = gig.packages[t];
    document.getElementById("pkgName").innerText = p.name;
    document.getElementById("pkgPrice").innerText = "$" + p.price;
    document.getElementById("pkgDesc").innerText = p.desc;
    document.getElementById("delivery").innerHTML = `<i class="far fa-clock" style="margin-right:5px"></i> ${p.delivery}`;
    document.getElementById("revisions").innerHTML = `<i class="fas fa-sync" style="margin-right:5px"></i> ${p.revisions}`;
    document.getElementById("features").innerHTML = p.features.map(f => `<div class="feature-item"><i class="fas fa-check"></i>${f}</div>`).join("");
}

function buy() {
    alert(`Proceeding to Checkout for [${gig.packages[currentTab].name}]`);
}

function goHome() {
 
}

window.onload = load;
</script>

</body>
</html>
