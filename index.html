 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskly</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/indexStyle.css">
    <link rel="stylesheet" href="css/gigStyle.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           1. CORE & GLOBAL STYLES
           ========================================= */
        :root {
            --primary: #7c3aed;
            --primary-hover: #a78bfa;
            --dark-bg: #050509;
            --deep-purple: #1e1b4b;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-card: rgba(30, 27, 75, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark-bg); color: var(--text-main); line-height: 1.5; font-size: 15px; overflow-x: hidden; }
        .cosmos-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 10%, var(--deep-purple) 0%, var(--dark-bg) 80%); }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }

        /* Navbar */
        .navbar { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border); z-index: 1000; display: flex; align-items: center; }
        .nav-content { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .logo { font-size: 1.7rem; font-weight: 800; color: white; text-decoration: none; cursor: pointer; }
        .logo span { color: var(--primary); }

        .btn-sm { padding: 8px 18px; border-radius: 12px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.3s; border: none; }
        .btn-primary { background: var(--primary); color: white; }

        .page { display: none; padding-top: 100px; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* =========================================
           UPDATED: ULTRA-PRO HERO STYLES
           ========================================= */
        .hero-pro {
            padding: 5px 20px 40px;
            text-align: center;
            margin-top: 10px;
        }

        .hero-inner {
            max-width: 850px;
            margin: 0 auto;
        }

        .pro-status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
           border-radius: 1.75rem;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        .status-indicator {
            width: 6px;
            height: 6px;
            background:var(--primary); 
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
        }

        .hero-pro h1 {
            font-size: clamp(2.2rem, 6vw, 3.4rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1.5px;
            margin-bottom: 18px;
            color: var(--primary);
        }

        .text-white { color: #ffffff; }

        .hero-pro p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 35px;
            line-height: 1.6;
            font-weight: 400;
        }
 .search-pro-container {
            display: flex;
            background: #0a0a10;
            border: 1px solid var(--glass-border);
            padding: 5px;
            border-radius: 1.75rem;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: 0.3s ease;
        }

        .search-pro-container:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.15);
        }

        .search-input-group {
            display: flex;
            align-items: center;
            flex: 1;
            padding-left: 15px;
        }

        .search-icon-pro { color: var(--primary); font-size: 0.9rem; }

        .search-pro-container input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 12px 15px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }

        .btn-pro-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 30px;
           border-radius: 1.75rem;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-pro-action:hover { background: var(--primary-hover); transform: translateY(-1px); }

        .hero-stats {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            opacity: 0.6;
        }

        .stat-item { font-size: 0.85rem; color: var(--text-muted); }
        .stat-item b { color: #fff; margin-right: 4px; }
        .stat-divider { width: 1px; height: 12px; background: var(--glass-border); }

        /* =========================================
           CATEGORIES & GIGS STYLES
           ========================================= */
        .categories-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 10px 0 30px 0; }
        @media (min-width: 768px) { .categories-grid { grid-template-columns: repeat(6, 1fr); } }

        .cat-btn { background: var(--glass); border: 1px solid var(--glass-border); padding: 1.4rem; border-radius: 2rem; text-align: center; cursor: pointer; transition: 0.3s; }
        .cat-btn:hover { background: rgba(255,255,255,0.06); transform: translateY(-5px); border-color: var(--primary); }
        .icon-box { width: 3rem; height: 3rem; margin: 0 auto 10px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .cat-label { font-weight: 700; font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); }

        .gigs-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            margin-bottom: 50px; 
        }

        @media (min-width: 1200px) { .gigs-grid { grid-template-columns: repeat(4, 1fr); } }

        .gig-card { 
            background: var(--glass-card); 
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); 
            border-radius: 1.75rem; 
            overflow: hidden; 
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .gig-card:hover { transform: translateY(-10px); border-color: rgba(124, 58, 237, 0.6); box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8); }
        .card-img-wrapper { position: relative; height: 180px; overflow: hidden; }
        .card-img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s ease; }
 .freelancer-info { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .freelancer-info img { width: 28px; height: 28px; border-radius: 8px; object-fit: cover; border: 1px solid var(--glass-border); }
        .freelancer-name { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); }

        .card-body { padding: 22px; display: flex; flex-direction: column; flex-grow: 1; }
        .card-body h3 { font-size: 1rem; font-weight: 800; margin: 0 0 15px 0; height: 2.8rem; overflow: hidden; line-height: 1.4; color: #fff; transition: color 0.3s ease; }
        .gig-card:hover h3 { color: var(--primary-hover); }

        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 15px; margin-top: auto; }
        .price-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; font-weight: 800; display: block; }
        .price-value { font-weight: 900; font-size: 1.2rem; color: #fff; }
        .rating { font-size: 0.75rem; font-weight: 800; color: #fbbf24; }
    </style>
</head>
<body>

    <div class="cosmos-bg"></div>

    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">Task<span>ly</span></a>
            <div style="display: flex; gap: 10px;">
                <button class="btn-sm" style="background:transparent; color:white;">Login</button>
                <button class="btn-sm btn-primary">Join Now</button>
            </div>
        </div>
    </nav>

    <main id="home-page" class="page active-page">
        <div class="container">
            <section class="hero-pro">
                <div class="hero-inner">
                    <div class="pro-status">
                        <span class="status-indicator"></span> 
                        Top-Rated Professional Network
                    </div>
                    
                    <h1>Make your vision <br> <span class="text-white">come true.</span></h1>
                    
                    <p>Connect with expert freelancers to turn your ideas into reality through high-quality design and development.</p>
                    
                    <div class="search-pro-container">
                        <div class="search-input-group">
                            <i class="fas fa-search search-icon-pro"></i>
                            <input type="text" placeholder="What service are you looking for?">
                        </div>
                        <button class="btn-pro-action">Search</button>
                    </div>
                </div>
            </section>

            <section class="categories-grid">
                 <div class="cat-btn"><div class="icon-box bg-design" style="background:rgba(124, 58, 237, 0.15); color: #a78bfa";><i class="fas fa-palette"></i></div><span class="cat-label">Design</span></div>
                <div class="cat-btn"><div class="icon-box bg-coding" style="background: rgba(59, 130, 246, 0.15); color: #60a5fa;"><i class="fas fa-code"></i></div><span class="cat-label">Coding</span></div>
                <div class="cat-btn"><div class="icon-box bg-design" style="background:rgba(239,68,68,0.15); color:#f87171;"><i class="fas fa-video"></i></div><span class="cat-label">Video</span></div>
                <div class="cat-btn"><div class="icon-box bg-design" style="background:rgba(34,197,94,0.15); color:#4ade80;"><i class="fas fa-pen"></i></div><span class="cat-label">Writing</span></div>
                <div class="cat-btn"><div class="icon-box bg-design" style="background:rgba(234,179,8,0.15); color:#facc15;"><i class="fas fa-bullhorn"></i></div><span class="cat-label">Ads</span></div>
                <div class="cat-btn"><div class="icon-box bg-design" style="background:rgba(236,72,153,0.15); color:#f472b6;"><i class="fas fa-music"></i></div><span class="cat-label">Music</span></div>
            </section>

            <h2 style="margin-bottom: 25px; font-weight: 800; letter-spacing: -0.5px;">popular Gigs</h2>
            <div id="gigs-container" class="gigs-grid"></div>
        </div>
    </main>
<script>
        const gigs = [
            { id: 1, title: "Modern Luxury Brand Identity Design", price: 80, cat: "Design", freelancer: "Ahmed B.", avatar: "https://i.pravatar.cc/100?u=1", img: "https://images.unsplash.com/photo-1626785774573-4b799315345d?w=800" },
            { id: 2, title: "Full Stack Web Application Development", price: 350, cat: "Coding", freelancer: "Sara M.", avatar: "https://i.pravatar.cc/100?u=2", img: "https://images.unsplash.com/photo-1587620962725-abab7fe55159?w=800" },
            { id: 3, title: "Social Media Video Marketing Content", price: 120, cat: "Video", freelancer: "Omar K.", avatar: "https://i.pravatar.cc/100?u=3", img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=800" },
            { id: 4, title: "Business Strategy & Growth Consulting", price: 150, cat: "Ads", freelancer: "Layla T.", avatar: "https://i.pravatar.cc/100?u=4", img: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800" }
        ];

        function renderGigs() {
            const container = document.getElementById('gigs-container');
            container.innerHTML = gigs.map(g => `
                <div class="gig-card" onclick="openDetails(${g.id})">
                    <div class="card-img-wrapper">
                        <img src="${g.img}" alt="${g.title}">
                    </div>
                    <div class="card-body">
                        <div class="freelancer-info">
                            <img src="${g.avatar}" alt="Freelancer">
                            <span class="freelancer-name">${g.freelancer}</span>
                        </div>
                        <span style="font-size:0.6rem; color:var(--primary); font-weight:800; text-transform:uppercase; letter-spacing:1px;">${g.cat}</span>
                        <h3>${g.title}</h3>
                        <div class="card-footer">
                            <div class="rating"><i class="fas fa-star"></i> 5.0</div>
                            <div class="price-container">
                                <span class="price-label">Starting at</span>
                                <span class="price-value">$${g.price}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openDetails(id) {
            // توجيه لصفحة التفاصيل مع تمرير المعرف في الرابط
            window.location.href = `details.html?id=${id}`;
        }

        window.onload = renderGigs;
    </script>
</body>
</html>
