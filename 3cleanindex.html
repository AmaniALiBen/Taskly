<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskly | Freelance Marketplace</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           1. CORE & THEME VARIABLES
           ========================================= */
        :root {
            --primary-color: #7c3aed;
            --primary-hover: #a78bfa;
            --background-dark: #050509;
            --background-deep: #1e1b4b;
            --glass-white: rgba(255, 255, 255, 0.03);
            --glass-card-bg: rgba(30, 27, 75, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --rating-gold: #fbbf24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--background-dark);
            color: var(--text-primary);
            line-height: 1.5;
            font-size: 15px;
            overflow-x: hidden;
        }

        .animated-background {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 10%, var(--background-deep) 0%, var(--background-dark) 80%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Navbar Styles */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
            display: flex;
            align-items: center;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .brand-logo {
            font-size: 1.7rem;
            font-weight: 800;
            color: white;
            text-decoration: none;
        }

        .brand-logo span {
            color: var(--primary-color);
        }

        .button-small {
            padding: 8px 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }

        .button-primary {
            background: var(--primary-color);
            color: white;
        }

        /* Hero Section */
        .hero-container {
            padding: 120px 20px 40px;
            text-align: center;
        }

        .hero-inner-content {
            max-width: 850px;
            margin: 0 auto;
        }

        .hero-container h1 {
            font-size: clamp(2.2rem, 6vw, 3.4rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 18px;
            color: var(--primary-color);
        }

        .white-highlight { color: #ffffff; }

        .search-wrapper {
            display: flex;
            background: #0a0a10;
            border: 1px solid var(--glass-border);
            padding: 5px;
            border-radius: 1.75rem;
            max-width: 600px;
            margin: 30px auto;
        }

        .search-wrapper input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 12px 15px;
            color: #fff;
            outline: none;
        }

        .search-button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 1.75rem;
            font-weight: 700;
            cursor: pointer;
        }

        /* Category Items */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 50px;
        }

        .category-button {
            background: var(--glass-white);
            border: 1px solid var(--glass-border);
            padding: 1.4rem;
            border-radius: 2rem;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .category-button:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }
        .icon-box { width: 3rem; height: 3rem; margin: 0 auto 10px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .category-label { font-weight: 700; font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); }

        

        /* =========================================
           2. GIG CARDS & CLEAN STYLING
           ========================================= */
        .gigs-main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .gig-card {
            background: var(--glass-card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 1.75rem;
            overflow: hidden;
            transition: 0.4s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .gig-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-hover);
        }

        .gig-image-container {
            height: 180px;
            overflow: hidden;
        }

        .gig-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gig-body-content {
            padding: 22px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        /* Fixed: Category naming and removed inline style */
        .gig-category-badge {
            font-size: 0.6rem;
            color: var(--primary-color);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
            display: block;
        }

        .gig-title-text {
            font-size: 1rem;
            font-weight: 800;
            margin: 10px 0 15px 0;
            height: 2.8rem;
            overflow: hidden;
            color: #fff;
        }

        .gig-footer-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
            margin-top: auto;
        }

        .rating-display {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--rating-gold);
        }

        .price-value-text {
            font-weight: 900;
            font-size: 1.2rem;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="animated-background"></div>

    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="brand-logo">Task<span>ly</span></a>
            <div style="display: flex; gap: 10px;">
                <button class="button-small" style="background:transparent; color:white;">Login</button>
                <button class="button-small button-primary">Join Now</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="hero-container">
            <div class="hero-inner-content">
                <div class="pro-status">
                        <span class="status-indicator"></span> 
                        Top-Rated Professional Network
                </div>
                <h1>Make your vision <br> <span class="white-highlight">come true.</span></h1>
                <p>Connect with expert freelancers to turn your ideas into reality through high-quality design and development.</p>
                    

                <div class="search-wrapper">
                    <input type="text" placeholder="What gig are you looking for?">
                    <button class="search-button">Search</button>
                </div>
            </div>
        </section>
        
         <section class="category-grid">
                 <div class="category-button"><div class="icon-box bg-design" style="background:rgba(124, 58, 237, 0.15); color: #a78bfa";><i class="fas fa-palette"></i></div><span class="category-label">Design</span></div>
                <div class="category-button"><div class="icon-box bg-coding" style="background: rgba(59, 130, 246, 0.15); color: #60a5fa;"><i class="fas fa-code"></i></div><span class="category-label">Coding</span></div>
                <div class="category-button"><div class="icon-box bg-design" style="background:rgba(239,68,68,0.15); color:#f87171;"><i class="fas fa-video"></i></div><span class="category-label">Video</span></div>
                <div class="category-button"><div class="icon-box bg-design" style="background:rgba(34,197,94,0.15); color:#4ade80;"><i class="fas fa-pen"></i></div><span class="category-label">Writing</span></div>
                <div class="category-button"><div class="icon-box bg-design" style="background:rgba(234,179,8,0.15); color:#facc15;"><i class="fas fa-bullhorn"></i></div><span class="category-label">Ads</span></div>
                <div class="category-button"><div class="icon-box bg-design" style="background:rgba(236,72,153,0.15); color:#f472b6;"><i class="fas fa-music"></i></div><span class="category-label">Music</span></div>
        </section>

        <h2 style="margin-bottom: 25px; font-weight: 800;">Popular Gigs</h2>
        <div id="gigs-main-container" class="gigs-main-grid"></div>
    </main>

    <script>
        // Data Store - Now includes actual rating data
        const gigsList = [
            { 
                id: 1, 
                title: "Modern Luxury Brand Identity Design", 
                price: 80, 
                category: "Design", 
                freelancer: "Ahmed B.", 
                avatar: "https://i.pravatar.cc/100?u=1", 
                image: "https://images.unsplash.com/photo-1626785774573-4b799315345d?w=800",
                rating: 4.9 
            },
            { 
                id: 2, 
                title: "Full Stack Web Application Development", 
                price: 350, 
                category: "Coding", 
                freelancer: "Sara M.", 
                avatar: "https://i.pravatar.cc/100?u=2", 
                image: "https://images.unsplash.com/photo-1587620962725-abab7fe55159?w=800",
                rating: 5.0
            },
            { 
                id: 3, 
                title: "Social Media Video Marketing Content", 
                price: 120, 
                category: "Video", 
                freelancer: "Omar K.", 
                avatar: "https://i.pravatar.cc/100?u=3", 
                image: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=800",
                rating: 4.8
            },
            { 
                id: 4, 
                title: "Business Strategy & Growth Consulting", 
                price: 150, 
                category: "Ads", 
                freelancer: "Layla T.", 
                avatar: "https://i.pravatar.cc/100?u=4", 
                image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800",
                rating: 4.7
            }
        ];

        // Rendering Engine
        function renderAvailableGigs() {
            const mainContainer = document.getElementById('gigs-main-container');
            
            mainContainer.innerHTML = gigsList.map(gig => `
                <div class="gig-card" onclick="navigateToGigDetails(${gig.id})">
                    <div class="gig-image-container">
                        <img src="${gig.image}" alt="${gig.title}">
                    </div>
                    <div class="gig-body-content">
                        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
                            <img src="${gig.avatar}" style="width: 28px; height: 28px; border-radius: 8px;">
                            <span style="font-size: 0.75rem; font-weight: 700; color: var(--text-secondary);">${gig.freelancer}</span>
                        </div>
                        <span class="gig-category-badge">${gig.category}</span>
                        <h3 class="gig-title-text">${gig.title}</h3>
                        <div class="gig-footer-info">
                            <div class="rating-display">
                                <i class="fas fa-star"></i> ${gig.rating}
                            </div>
                            <div class="price-container-box">
                                <span style="font-size: 0.6rem; color: var(--text-secondary); display: block; text-transform: uppercase; font-weight: 800;">Starting at</span>
                                <span class="price-value-text">$${gig.price}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function navigateToGigDetails(gigId) {
            window.location.href = `details.html?id=${gigId}`;
        }

        window.onload = renderAvailableGigs;
    </script>
</body>
</html>
